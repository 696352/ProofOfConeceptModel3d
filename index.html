<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Portfolio Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; font-family: sans-serif; }
    #ui-container { position: fixed; top: 20px; left: 20px; z-index: 100; }
    select { 
      padding: 12px 25px; border-radius: 50px; border: 1px solid #ccc; 
      background: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
      font-size: 16px; outline: none;
    }
    #loading-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.8); display: none; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 999; color: white; 
    }
    .bar-container { width: 200px; height: 4px; background: #333; margin-top: 10px; border-radius: 10px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.2s; }
  </style>
</head>
<body>

  <div id="ui-container">
    <select id="model-select">
      <option value="" disabled selected>Select Week</option>
      <option value="Week15Done-v1.glb">Week 15</option>
      <option value="Week9-v1.glb">Week 9</option>
      <option value="Week3.glb">Week 3</option>
    </select>
  </div>

  <div id="loading-overlay">
    <div id="status-text">Loading Model...</div>
    <div class="bar-container"><div id="progress-bar"></div></div>
  </div>

<script type="module">
// Switching to esm.sh for better DRACO support
import * as THREE from "https://esm.sh/three@0.160.0";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { DRACOLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/DRACOLoader.js";

// --- ENGINE START ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

// Grid - Heartbeat check
const grid = new THREE.GridHelper(100, 100, 0x888888, 0xcccccc);
scene.add(grid);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(30, 30, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 2));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(10, 50, 10);
scene.add(sun);

// --- LOADER SETUP ---
const draco = new DRACOLoader();
// Pointing to a reliable decoder path
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.
