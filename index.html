<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Viewer - Low Memory Mode</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #333; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; color: white; display: flex; 
      justify-content: center; align-items: center; z-index: 10;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<div id="loading">Loading Models...</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xcccccc);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 2, 15);

// Simplest possible renderer to prevent Context Loss
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(1); // Force low resolution to save GPU memory
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1));
const dl = new THREE.DirectionalLight(0xffffff, 1);
dl.position.set(1, 1, 1);
scene.add(dl);

const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");

const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

// IMPORTANT: Use your actual filenames here
const models = ["Week3.glb", "Week8.glb", "Week15.glb"];

models.forEach((path, i) => {
  loader.load(path, (gltf) => {
    const m = gltf.scene;
    m.position.x = (i - 1) * 10;
    scene.add(m);
    
    // Hide loading screen once at least one model is in
    document.getElementById('loading').style.display = 'none';
  }, undefined, (e) => console.error(e));
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Handle context loss gracefully
renderer.domElement.addEventListener("webglcontextlost", (event) => {
    event.preventDefault();
    alert("Graphics crashed. The models might be too large for this device.");
}, false);
</script>
</body>
</html>
