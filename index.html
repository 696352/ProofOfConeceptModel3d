<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Model Viewer | Selective Load</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; font-family: 'Segoe UI', sans-serif; }
    
    /* UI Overlay */
    #ui-container {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      background: rgba(255, 255, 255, 0.9); padding: 15px;
      border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    select {
      padding: 8px; font-size: 1rem; border-radius: 4px; border: 1px solid #ccc;
      outline: none; cursor: pointer; width: 200px;
    }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; }

    /* Loading Indicator */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(238, 238, 238, 0.8); display: none;
      flex-direction: column; justify-content: center; align-items: center; z-index: 100;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid #ddd;
      border-top: 4px solid #3498db; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="ui-container">
    <label for="model-select">Select a Model:</label>
    <select id="model-select">
      <option value="Week3.glb">Week 3 Scan</option>
      <option value="Week9Done-v1.glb">Week 8 Scan</option>
      <option value="Week15Done-v1.glb">Week 15 Scan</option>
    </select>
  </div>

  <div id="loader">
    <div class="spinner"></div>
    <p id="loader-text">Loading Model...</p>
  </div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

// --- INITIAL SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee); // Light grey background

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 10, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(10, 20, 10);
scene.add(light);

// --- LOADERS ---
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");

const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);

// --- MODEL MANAGEMENT ---
let currentModel = null;
const loaderEl = document.getElementById('loader');
const selectEl = document.getElementById('model-select');

function loadModel(filename) {
  // 1. Clear old model from memory
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse((node) => {
      if (node.isMesh) {
        node.geometry.dispose();
        if (Array.isArray(node.material)) {
          node.material.forEach(m => m.dispose());
        } else {
          node.material.dispose();
        }
      }
    });
  }

  // 2. Show loader
  loaderEl.style.display = 'flex';

  // 3. Load new file
  loader.load(filename, (gltf) => {
    currentModel = gltf.scene;

    // Apply Z-fighting fixes
    currentModel.traverse((node) => {
      if (node.isMesh) {
        node.material.side = THREE.FrontSide;
        node.material.polygonOffset = true;
        node.material.polygonOffsetFactor = 1;
        node.material.polygonOffsetUnits = 1;
        node.material.depthWrite = true;
      }
    });

    // Auto-center
    const box = new THREE.Box3().setFromObject(currentModel);
    const center = box.getCenter(new THREE.Vector3());
    currentModel.position.sub(center);

    scene.add(currentModel);
    
    // Adjust camera
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    camera.position.set(0, maxDim * 0.5, maxDim * 1.5);
    controls.target.set(0, 0, 0);
    controls.update();

    loaderEl.style.display = 'none';
  }, 
  (xhr) => {
    const percent = Math.round((xhr.loaded / xhr.total) * 100);
    document.getElementById('loader-text').innerText = `Loading ${filename}: ${percent}%`;
  },
  (error) => {
    console.error(error);
    loaderEl.style.display = 'none';
    alert("Error loading model. Check console.");
  });
}

// Event Listener for Dropdown
selectEl.addEventListener('change', (e) => {
  loadModel(e.target.value);
});

// Load the first model by default
loadModel(selectEl.value);

// --- MAIN LOOP ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
