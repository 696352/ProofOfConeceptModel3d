<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Portfolio Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; font-family: 'Segoe UI', sans-serif; }
    #ui-container { position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; }
    select { padding: 12px 25px; border-radius: 50px; border: 1px solid #ccc; background: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    #fs-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid #ccc; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    #hint-overlay { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; padding: 10px 22px; border-radius: 30px; pointer-events: none; transition: opacity 0.5s; font-size: 14px; z-index: 10; }
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(17, 17, 17, 0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999; color: white; transition: opacity 0.4s; }
    .bar-container { width: 250px; height: 6px; background: #333; margin-top: 20px; border-radius: 10px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.2s; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="ui-container">
    <select id="model-select">
      <option value="" disabled selected>Select Week</option>
      <option value="Week15Done-v1.glb">Week 15</option>
      <option value="Week9-v1.glb">Week 9</option>
      <option value="Week3.glb">Week 3</option>
    </select>
    <button id="fs-btn">⛶</button>
  </div>

  <div id="hint-overlay">Drag to Rotate • Scroll to Zoom</div>

  <div id="loading-overlay">
    <div id="status-text">Loading Model...</div>
    <div class="bar-container"><div id="progress-bar"></div></div>
  </div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

const select = document.getElementById('model-select');
const overlay = document.getElementById('loading-overlay');
const bar = document.getElementById('progress-bar');
const status = document.getElementById('status-text');
const hint = document.getElementById('hint-overlay');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 12); 

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.0;
controls.target.set(0, 0, 0); // Always rotate around world center

scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10, 10, 10);
scene.add(sun);

const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let currentModel = null;

function loadModel(filename) {
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse(n => { if(n.isMesh) { n.geometry.dispose(); if(n.material.dispose) n.material.dispose(); } });
  }

  overlay.style.display = 'flex';
  overlay.style.opacity = '1';
  bar.style.width = '0%';
  status.innerText = "Downloading...";

  loader.load(filename, (gltf) => {
    currentModel = gltf.scene;

    // --- FIX POSITION & SCALE ---
    const bbox = new THREE.Box3().setFromObject(currentModel);
    const center = bbox.getCenter(new THREE.Vector3());
    const size = bbox.getSize(new THREE.Vector3());

    // Move model so its internal center is at 0,0,0
    currentModel.position.x = -center.x;
    currentModel.position.y = -center.y;
    currentModel.position.z = -center.z;

    // Scale model to fit in a consistent view (approx 7 units wide)
    const maxDim = Math.max(size.x, size.y, size.z);
    const scaleFactor = 7 / (maxDim || 1);
    currentModel.scale.set(scaleFactor, scaleFactor, scaleFactor);

    scene.add(currentModel);
    
    // Reset camera and controls to look at the new centered model
    controls.reset();
    controls.target.set(0, 0, 0); 
    camera.position.set(0, 2, 12);
    controls.autoRotate = true;

    overlay.style.opacity = '0';
    setTimeout(() => { overlay.style.display = 'none'; }, 500);

  }, (xhr) => {
    // Safety check for loading bar
    if (xhr.lengthComputable) {
      const p = (xhr.loaded / xhr.total) * 100;
      bar.style.width = p + '%';
      status.innerText = `Loading: ${Math.round(p)}%`;
    } else {
      status.innerText = "Streaming Data...";
      bar.style.width = '50%'; // Placeholder if total size is unknown
    }
  }, (err) => {
    status.innerText = "Error Loading File";
  });
}

select.addEventListener('change', (e) => {
  loadModel(e.target.value);
  hint.style.opacity = '1'; // Show hint again on new load
});

document.getElementById('fs-btn').onclick = () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};

const stopAuto = () => { controls.autoRotate = false; hint.style.opacity = '0'; };
renderer.domElement.addEventListener('mousedown', stopAuto);
renderer.domElement.addEventListener('wheel', stopAuto);

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
