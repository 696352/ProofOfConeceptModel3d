<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Portfolio Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Oval Pill Dropdown - Top Left */
    #ui-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
    }

    select {
      padding: 12px 25px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 50px; /* Oval Shape */
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      outline: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      appearance: none;
      -webkit-appearance: none;
      /* Custom Arrow SVG */
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 18px center;
      background-size: 14px;
      padding-right: 50px;
      transition: all 0.2s ease-in-out;
      color: #333;
    }

    select:hover {
      background-color: #f9f9f9;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    /* Loading Overlay */
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(17, 17, 17, 0.85); display: none; flex-direction: column;
      justify-content: center; align-items: center; z-index: 999;
      color: white; opacity: 0; transition: opacity 0.4s ease;
      backdrop-filter: blur(4px);
    }

    .bar-container { width: 280px; height: 6px; background: #333; margin-top: 20px; border-radius: 20px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.3s ease; box-shadow: 0 0 8px #00ffcc; }
    
    #status-text { letter-spacing: 1.5px; font-weight: 400; text-transform: uppercase; font-size: 11px; color: #aaa; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <div id="ui-container">
    <select id="model-select">
      <option value="" disabled selected>Select Model</option>
      <option value="Week15Done-v1.glb">Week 15</option>
      <option value="Week13-v1-v1.glb">Week 13</option>
      <option value="Week9-v1.glb">Week 9</option>
      <option value="Week7-v1-v1.glb">Week 7</option>
      <option value="Week3.glb">Week 3</option>
    </select>
  </div>

  <div id="loading-overlay">
    <div id="status-text">Processing Geometry... 0%</div>
    <div class="bar-container"><div id="progress-bar"></div></div>
  </div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

const select = document.getElementById('model-select');
const overlay = document.getElementById('loading-overlay');
const bar = document.getElementById('progress-bar');
const status = document.getElementById('status-text');

// --- SCENE SETUP ---
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0xeeeeee, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 15); 

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 1.8));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(5, 10, 7);
scene.add(sun);

// --- LOADERS ---
const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let currentModel = null;

function loadModel(filename) {
  // 1. Cleanup VRAM
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse((n) => {
      if (n.isMesh) {
        n.geometry.dispose();
        if (Array.isArray(n.material)) n.material.forEach(m => m.dispose());
        else n.material.dispose();
      }
    });
  }

  // 2. Show Loading UI
  overlay.style.display = 'flex';
  overlay.style.opacity = '1';
  bar.style.width = '0%';
  status.innerText = "Accessing " + filename;

  // 3. Load
  loader.load(filename, (gltf) => {
    currentModel = gltf.scene;
    
    // Robust Centering
    const box = new THREE.Box3().setFromObject(currentModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    currentModel.position.x += (currentModel.position.x - center.x);
    currentModel.position.y += (currentModel.position.y - center.y);
    currentModel.position.z += (currentModel.position.z - center.z);

    // Auto-Scale
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 7 / (maxDim || 1); 
    currentModel.scale.set(scale, scale, scale);

    scene.add(currentModel);
    controls.reset();
    
    overlay.style.opacity = '0';
    setTimeout(() => { overlay.style.display = 'none'; }, 500);
    renderer.render(scene, camera);

  }, (xhr) => {
    if (xhr.total > 0) {
      let p = Math.min((xhr.loaded / xhr.total) * 100, 100);
      bar.style.width = p + '%';
      status.innerText = `Loading Assets... ${Math.round(p)}%`;
    }
  }, (err) => {
    status.innerText = "Error: File Missing";
    console.error("Failed to load:", filename, err);
  });
}

select.addEventListener('change', (e) => loadModel(e.target.value));

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

renderer.render(scene, camera);
</script>
</body>
</html>
