<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Multi-Model Viewer | Optimized</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #222; font-family: sans-serif; }
    
    /* Loading Overlay */
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 1000;
      color: #00ffcc; transition: opacity 0.8s ease;
    }
    .progress-container { width: 250px; height: 6px; background: #333; margin-top: 15px; border-radius: 10px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.3s; }
    #status-text { font-size: 1rem; letter-spacing: 1px; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="loading-overlay">
    <div id="status-text">Loading Optimized Assets... 0%</div>
    <div class="progress-container">
      <div id="progress-bar"></div>
    </div>
  </div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

// --- SCENE SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x333333);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 10, 30);

const renderer = new THREE.WebGLRenderer({ 
  antialias: true, 
  powerPreference: "high-performance" 
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.
