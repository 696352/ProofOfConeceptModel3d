<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Portfolio Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Oval Dropdown in the Left */
    #ui-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
    }

    select {
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 50px; /* Makes it Oval */
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      outline: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      appearance: none; /* Removes default arrow for a cleaner look */
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 15px;
      padding-right: 45px;
      transition: all 0.3s ease;
    }

    select:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    /* Loading Overlay Animation */
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(17, 17, 17, 0.9); display: none; flex-direction: column;
      justify-content: center; align-items: center; z-index: 999;
      color: white; opacity: 0; transition: opacity 0.4s ease;
    }
