<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Multi-Model Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #333; font-family: sans-serif; }
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 999;
      color: white; transition: opacity 0.5s;
    }
    .bar { width: 200px; height: 4px; background: #444; margin-top: 10px; }
    #progress { width: 0%; height: 100%; background: #00ffcc; transition: width 0.2s; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="loading-overlay">
    <div id="status">Connecting to GitHub...</div>
    <div class="bar"><div id="progress"></div></div>
  </div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(10, 10, 10);
scene.add(light);

// --- UPDATED MANAGER ---
const manager = new THREE.LoadingManager();

manager.onStart = (url) => {
  console.log("Started loading:", url);
};

manager.onProgress = (url, loaded, total) => {
  const p = (loaded / total) * 100;
  document.getElementById('progress').style.width = p + '%';
  document.getElementById('status').innerHTML = `Downloading: ${Math.round(p)}%`;
};

manager.onLoad = () => {
  document.getElementById('loading-overlay').style.opacity = '0';
  setTimeout(() => { 
    document.getElementById('loading-overlay').style.display = 'none';
    fitCamera();
  }, 500);
};

manager.onError = (url) => {
  console.error("FAILED TO LOAD:", url);
  alert("CRITICAL ERROR: Could not find " + url + "\n\nCheck your GitHub filenames!");
};

const draco = new DRACOLoader();
// Using a more reliable CDN path for Draco
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");

const loader = new GLTFLoader(manager);
loader.setDRACOLoader(draco);

// --- THE MODELS ---
// 1. Ensure these are exactly as they appear in your GitHub file list
// 2. Do NOT use a leading slash /
const models = ["Week3.glb", "Week8.glb", "Week15.glb"];
const group = new THREE.Group(); 
scene.add(group);

models.forEach((path, i) => {
  loader.load(path, (gltf) => {
    const m = gltf.scene;
    const b = new THREE.Box3().setFromObject(m);
    const center = b.getCenter(new THREE.Vector3());
    m.position.sub(center);

    const wrapper = new THREE.Group();
    wrapper.add(m);
    wrapper.position.x = (i - 1) * 12; // Wider spacing
    group.add(wrapper);
  });
});

function fitCamera() {
  const box = new THREE.Box3().setFromObject(group);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  camera.position.set(center.x, center.y + 2, maxDim * 1.5);
  controls.target.copy(center);
  controls.update();
}

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
