<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Multi-Model Viewer</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: #eeeeee; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    /* Loading Screen Styles */
    #loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      color: white;
      transition: opacity 0.8s ease;
    }

    .loader-bar-container {
      width: 250px;
      height: 6px;
      background: #333;
      margin-top: 20px;
      border-radius: 10px;
      overflow: hidden;
    }

    #loader-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00dbde 0%, #fc00ff 100%);
      transition: width 0.3s ease;
    }

    #loading-text {
      font-size: 1.2rem;
      letter-spacing: 1px;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <div id="loading-overlay">
    <div id="loading-text">Initializing Models... 0%</div>
    <div class="loader-bar-container">
      <div id="loader-bar"></div>
    </div>
  </div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

// --- SETUP ---
const overlay = document.getElementById('loading-overlay');
const loadingText = document.getElementById('loading-text');
const loadingBar = document.getElementById('loader-bar');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
// Positioned back and slightly up to see all three models
camera.position.set(0, 5, 18); 

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
// Better lighting/color representation
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// --- LIGHTING ---
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);

// --- LOADING MANAGER ---
const manager = new THREE.LoadingManager();

manager.onProgress = (url, itemsLoaded, itemsTotal) => {
  const progress = (itemsLoaded / itemsTotal) * 100;
  loadingBar.style.width = progress + '%';
  loadingText.innerText = `Loading Assets... ${Math.round(progress)}%`;
};

manager.onLoad = () => {
  console.log("All models loaded successfully.");
  overlay.style.opacity = '0';
  setTimeout(() => {
    overlay.style.display = 'none';
  }, 800);
};

manager.onError = (url) => {
  console.error('There was an error loading ' + url);
  loadingText.innerText = "Error loading models. Check console.";
  loadingText.style.color = "#ff4444";
};

// --- LOADERS ---
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath("https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/");

const loader = new GLTFLoader(manager);
loader.setDRACOLoader(dracoLoader);

// --- MODELS CONFIGURATION ---
// IMPORTANT: Change these names to match your files in GitHub exactly!
const modelPaths = ["color4.glb", "model2.glb", "model3
