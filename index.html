<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Portfolio Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Oval Dropdown */
    #ui-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      gap: 10px;
    }

    select {
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 50px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      outline: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 15px;
      padding-right: 45px;
      transition: all 0.3s ease;
    }

    /* Fullscreen & UI Buttons */
    .icon-btn {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .icon-btn:hover { transform: scale(1.1); }

    /* Interaction Hint */
    #hint-overlay {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 10;
      font-size: 14px;
    }

    /* Loading Overlay */
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(17, 17, 17, 0.9); display: none; flex-direction: column;
      justify-content: center; align-items: center; z-index: 999;
      color: white; opacity: 0; transition: opacity 0.4s ease;
    }

    .bar-container { width: 280px; height: 8px; background: #333; margin-top: 20px; border-radius: 20px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.3s ease; box-shadow: 0 0 10px #00ffcc; }
    #status-text { letter-spacing: 2px; font-weight: 300; text-transform: uppercase; font-size: 12px; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
