<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Portfolio Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; font-family: sans-serif; }
    #ui-container { position: fixed; top: 20px; left: 20px; z-index: 100; }
    select { 
      padding: 12px 25px; border-radius: 50px; border: 1px solid #ccc; 
      background: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
      font-size: 16px; outline: none;
    }
    #loading-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.8); display: none; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 999; color: white; 
    }
    .bar-container { width: 200px; height: 4px; background: #333; margin-top: 10px; border-radius: 10px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.2s; }
  </style>
</head>
<body>

  <div id="ui-container">
    <select id="model-select">
      <option value="" disabled selected>Select Week</option>
      <option value="Week15Done-v1.glb">Week 15</option>
      <option value="Week9-v1.glb">Week 9</option>
      <option value="Week3.glb">Week 3</option>
    </select>
  </div>

  <div id="loading-overlay">
    <div id="status-text">Loading Model...</div>
    <div class="bar-container"><div id="progress-bar"></div></div>
  </div>

<script type="module">
// Using Direct URLs to ensure the grid always shows up
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { DRACOLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/DRACOLoader.js";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

// Grid - If you see this, the code is running correctly
const grid = new THREE.GridHelper(100, 100);
scene.add(grid);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(20, 20, 20);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 2));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10, 20, 10);
scene.add(sun);

const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let currentModel = null;

function loadModel(filename) {
    if (currentModel) scene.remove(currentModel);
    
    const overlay = document.getElementById('loading-overlay');
    const bar = document.getElementById('progress-bar');
    
    overlay.style.display = 'flex';
    bar.style.width = '0%';

    loader.load(filename, (gltf) => {
        currentModel = gltf.scene;

        // Simple Centering (Back to basics)
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        
        currentModel.position.x = -center.x;
        currentModel.position.y = -center.y;
        currentModel.position.z = -center.z;

        scene.add(currentModel);

        // Reset camera view
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        camera.position.set(maxDim * 1.5, maxDim * 1.5, maxDim * 1.5);
        controls.target.set(0, 0, 0);
        controls.update();

        overlay.style.display = 'none';
    }, 
    (xhr) => {
        if (xhr.total > 0) bar.style.width = (xhr.loaded / xhr.total * 100) + '%';
    }, 
    (err) => {
        console.error(err);
        document.getElementById('status-text').innerText = "Error: File not found";
    });
}

document.getElementById('model-select').onchange = (e) => loadModel(e.target.value);

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
