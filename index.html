<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Portfolio Viewer</title>
  <style>
    :root {
      --primary-blue: #007bff;
      --dark-navy: #000c1d;
      --sky-blue: #7baef7;
      --north-red: #ff3b3b;
      --south-white: #ffffff;
    }

    body { 
      margin: 0; 
      overflow: hidden; 
      background: linear-gradient(180deg, var(--dark-navy) 0%, var(--sky-blue) 100%);
      font-family: 'Segoe UI', sans-serif; 
    }
    
    #ui-container { position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; align-items: center; }

    select, .toggle-container { 
      padding: 10px 20px; border-radius: 50px; 
      border: 2px solid var(--primary-blue); 
      background: white; color: var(--primary-blue);
      box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
      font-size: 14px; font-weight: 600; outline: none;
    }

    /* 2D Compass Rose (Bottom Left) */
    #compass-hud {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 80px;
      height: 80px;
      z-index: 100;
      pointer-events: none;
    }
    #compass-ring {
      width: 100%;
      height: 100%;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.2);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* The Two-Tone Needle */
    #needle-wrapper {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .needle-part {
      width: 6px;
      height: 30px;
      border-radius: 2px;
    }
    .north-needle { background: var(--north-red); box-shadow: 0 0 10px var(--north-red); }
    .south-needle { background: var(--south-white); }

    /* Direction Labels */
    .dir { position: absolute; font-weight: 900; font-size: 12px; color: white; opacity: 0.8; }
    .n { top: -20px; color: var(--north-red); opacity: 1; }
    .s { bottom: -20px; }

    #reset-btn {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--primary-blue); color: white;
      padding: 12px 25px; border-radius: 50px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100;
    }

    #loading-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: var(--dark-navy); display: none; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 999; color: white; 
    }
    .bar-container { width: 200px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 15px; border-radius: 10px; }
    #progress-bar { width: 0%; height: 100%; background: var(--primary-blue); }
  </style>
</head>
<body>

  <div id="ui-container">
    <select id="model-select">
      <option value="" disabled selected>Select Week</option>
      <option value="Week15Done-v1.glb">Week 15</option>
      <option value="Week9-v1.glb">Week 9</option>
      <option value="Week3.glb">Week 3</option>
    </select>

    <div class="toggle-container">
      Grid
      <input type="checkbox" id="grid-toggle" style="margin-left: 10px;">
    </div>
  </div>

  <div id="compass-hud">
    <div id="compass-ring">
      <div id="needle-wrapper">
        <div class="dir n">N</div>
        <div class="needle-part north-needle"></div>
        <div class="needle-part south-needle"></div>
        <div class="dir s">S</div>
      </div>
    </div>
  </div>

  <button id="reset-btn">RESET VIEW (R)</button>

  <div id="loading-overlay">
    <div id="status-text">LOADING...</div>
    <div class="bar-container"><div id="progress-bar"></div></div>
  </div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { DRACOLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/DRACOLoader.js";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;

scene.add(new THREE.AmbientLight(0xffffff, 2.5));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(10, 50, 10);
scene.add(sun);

const grid = new THREE.GridHelper(100, 100, 0x007bff, 0xffffff);
grid.visible = false;
scene.add(grid);

const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let currentModel = null;
let defaultCameraPos = new THREE.Vector3(60, 40, 0); // Side-on view for North=Left
let defaultTarget = new THREE.Vector3(0, 0, 0);

const needleWrapper = document.getElementById('needle-wrapper');

function resetCamera() {
    controls.reset(); // Stop stutter/momentum
    camera.position.copy(defaultCameraPos);
    controls.target.copy(defaultTarget);
    controls.update();
    renderer.render(scene, camera);
}

function loadModel(filename) {
    if (currentModel) scene.remove(currentModel);
    document.getElementById('loading-overlay').style.display = 'flex';

    loader.load(filename, (gltf) => {
        currentModel = gltf.scene;
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        currentModel.position.set(-center.x, -box.min.y, -center.z);
        scene.add(currentModel);

        const maxDim = Math.max(size.x, size.z);
        // Resetting to look at the "side" so North is Left (-X)
        defaultCameraPos.set(maxDim * 2.5, size.y * 0.8, 0); 
        defaultTarget.set(0, size.y / 3, 0);
        
        resetCamera();
        document.getElementById('loading-overlay').style.display = 'none';
    }, 
    (xhr) => {
        if (xhr.total > 0) document.getElementById('progress-bar').style.width = (xhr.loaded / xhr.total * 100) + '%';
    });
}

document.getElementById('grid-toggle').onchange = (e) => grid.visible = e.target.checked;
document.getElementById('reset-btn').onclick = resetCamera;
document.getElementById('model-select').onchange = (e) => loadModel(e.target.value);
window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'r') resetCamera(); });

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Compass Logic: Rotate needle based on camera position around center
    // We offset the angle so N points Left when the camera is at the Reset position
    const angle = Math.atan2(camera.position.x - controls.target.x, camera.position.z - controls.target.z);
    needleWrapper.style.transform = `rotate(${angle + Math.PI/2}rad)`;

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
