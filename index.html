<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Portfolio Viewer</title>
  <style>
    :root {
      --primary-blue: #007bff;
      --hover-blue: #0056b3;
      --dark-navy: #000c1d;
      --sky-blue: #7baef7;
    }

    body { 
      margin: 0; 
      overflow: hidden; 
      background: linear-gradient(180deg, var(--dark-navy) 0%, var(--sky-blue) 100%);
      font-family: 'Segoe UI', sans-serif; 
    }
    
    #ui-container { position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; align-items: center; }

    select, .toggle-container { 
      padding: 10px 20px; border-radius: 50px; 
      border: 2px solid var(--primary-blue); 
      background: white; color: var(--primary-blue);
      box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
      font-size: 14px; font-weight: 600; outline: none;
    }

    /* Toggle Switch */
    .switch { position: relative; display: inline-block; width: 34px; height: 18px; margin-left: 8px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc; transition: .4s; border-radius: 20px;
    }
    .slider:before {
      position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px;
      background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--primary-blue); }
    input:checked + .slider:before { transform: translateX(16px); }

    #reset-btn {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--primary-blue); color: white;
      padding: 12px 25px; border-radius: 50px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100;
    }

    #loading-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: var(--dark-navy); display: none; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 999; color: white; 
    }
    .bar-container { width: 200px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 15px; border-radius: 10px; }
    #progress-bar { width: 0%; height: 100%; background: var(--primary-blue); }
  </style>
</head>
<body>

  <div id="ui-container">
    <select id="model-select">
      <option value="" disabled selected>Select Week</option>
      <option value="Week15Done-v1.glb">Week 15</option>
      <option value="Week9-v1.glb">Week 9</option>
      <option value="Week3.glb">Week 3</option>
    </select>

    <div class="toggle-container">
      Grid
      <label class="switch"><input type="checkbox" id="grid-toggle"><span class="slider"></span></label>
    </div>
  </div>

  <button id="reset-btn">RESET VIEW (R)</button>

  <div id="loading-overlay">
    <div id="status-text">LOADING...</div>
    <div class="bar-container"><div id="progress-bar"></div></div>
  </div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { DRACOLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/DRACOLoader.js";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;

// Light Setup
scene.add(new THREE.AmbientLight(0xffffff, 2));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(10, 50, 10);
scene.add(sun);

// Grid Helper
const grid = new THREE.GridHelper(100, 100, 0x007bff, 0xffffff);
grid.visible = false;
scene.add(grid);

// COMPASS INDICATOR
const compassGroup = new THREE.Group();
const createLabel = (text, pos) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 128; canvas.height = 128;
    ctx.fillStyle = '#007bff'; ctx.font = 'bold 80px Arial';
    ctx.textAlign = 'center'; ctx.fillText(text, 64, 90);
    const texture = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
    sprite.scale.set(4, 4, 1);
    sprite.position.copy(pos);
    return sprite;
};

// Based on your request: North is Left (-X), South is Right (+X)
const nLabel = createLabel('N', new THREE.Vector3(-15, 0, 0));
const sLabel = createLabel('S', new THREE.Vector3(15, 0, 0));
compassGroup.add(nLabel, sLabel);
scene.add(compassGroup);

// Loaders
const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let currentModel = null;
let defaultCameraPos = new THREE.Vector3(0, 40, 60);
let defaultTarget = new THREE.Vector3(0, 0, 0);

function resetCamera() {
    controls.enabled = false; // Disable to break momentum
    camera.position.copy(defaultCameraPos);
    controls.target.copy(defaultTarget);
    controls.update();
    controls.enabled = true;
    renderer.render(scene, camera);
}

function loadModel(filename) {
    if (currentModel) scene.remove(currentModel);
    document.getElementById('loading-overlay').style.display = 'flex';

    loader.load(filename, (gltf) => {
        currentModel = gltf.scene;
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        currentModel.position.set(-center.x, -box.min.y, -center.z);
        scene.add(currentModel);

        // Adjust Compass height to be just above floor level
        compassGroup.position.y = 0.1;

        const maxDim = Math.max(size.x, size.z);
        // Set camera to look "straight on" (Z-axis view)
        defaultCameraPos.set(0, size.y * 0.8, maxDim * 2);
        defaultTarget.set(0, size.y / 3, 0);
        
        resetCamera();
        document.getElementById('loading-overlay').style.display = 'none';
    }, 
    (xhr) => {
        if (xhr.total > 0) document.getElementById('progress-bar').style.width = (xhr.loaded / xhr.total * 100) + '%';
    });
}

document.getElementById('grid-toggle').onchange = (e) => grid.visible = e.target.checked;
document.getElementById('reset-btn').onclick = resetCamera;
document.getElementById('model-select').onchange = (e) => loadModel(e.target.value);
window.addEventListener('keydown', (e) => { if (e.key.toLowerCase() === 'r') resetCamera(); });

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
