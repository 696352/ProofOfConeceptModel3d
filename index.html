  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; font-family: sans-serif; }
    
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 999;
      color: white; transition: opacity 0.5s;
    }

    .bar-container { width: 250px; height: 6px; background: #222; margin-top: 15px; border-radius: 10px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.3s ease; }
    #status-text { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; text-align: center; max-width: 80%; }
    
    /* Error popup style */
    #error-msg {
      display: none;
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #ff4444; color: white; padding: 15px 25px;
      border-radius: 8px; z-index: 1000; font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
  </style>

    }
  }
  </script>
</head>
