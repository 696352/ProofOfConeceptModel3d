<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>3D Portfolio Viewer</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background-color: #eeeeee;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Oval Dropdown (LEFT) */
#ui-container {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 100;
}

select {
  padding: 12px 25px;
  font-size: 16px;
  border-radius: 50px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  outline: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 15px center;
  background-size: 15px;
  padding-right: 45px;
  transition: all 0.3s ease;
}

select:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

/* Loading Overlay */
#loading-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(17,17,17,0.9);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
  color: white;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.bar-container {
  width: 280px;
  height: 8px;
  background: #333;
  margin-top: 20px;
  border-radius: 20px;
  overflow: hidden;
}

#progress-bar {
  width: 0%;
  height: 100%;
  background: #00ffcc;
  transition: width 0.3s ease;
}

/* Error Message */
#error-msg {
  display: none;
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #ff4444;
  color: white;
  padding: 12px 25px;
  border-radius: 5px;
  z-index: 1000;
  font-weight: bold;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>

<body>

<div id="ui-container">
  <select id="model-select">
    <option value="" disabled selected>Select a Week</option>
    <option value="Week15Done-v1.glb">Week 15 Model</option>
    <option value="Week9-v1.glb">Week 9 Model</option>
    <option value="Week3.glb">Week 3 Model</option>
  </select>
</div>

<div id="error-msg"></div>

<div id="loading-overlay">
  <div id="status-text">Loading... 0%</div>
  <div class="bar-container">
    <div id="progress-bar"></div>
  </div>
</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

const select = document.getElementById('model-select');
const overlay = document.getElementById('loading-overlay');
const bar = document.getElementById('progress-bar');
const status = document.getElementById('status-text');
const errorUI = document.getElementById('error-msg');

let renderer;

try {
  renderer = new THREE.WebGLRenderer({
    antialias: true,
    powerPreference: "high-performance"
  });
} catch (e) {
  errorUI.style.display = "block";
  errorUI.innerText = "WebGL failed. Try another browser.";
  throw e;
}

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0xeeeeee, 1);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 12);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 7);
scene.add(light);

// Loaders
const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let currentModel = null;

function loadModel(filename) {
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse((n) => {
      if (n.isMesh) {
        n.geometry.dispose();
        if (Array.isArray(n.material)) n.material.forEach(m => m.dispose());
        else n.material.dispose();
      }
    });
  }

  overlay.style.display = 'flex';
  overlay.style.opacity = '1';
  bar.style.width = '0%';
  status.innerText = "Loading " + filename + "...";

  loader.load(filename, (gltf) => {
    currentModel = gltf.scene;

    // Center + scale
    const box = new THREE.Box3().setFromObject(currentModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    currentModel.position.sub(center);

    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 6 / (maxDim || 1);
    currentModel.scale.set(scale, scale, scale);

    scene.add(currentModel);

    // --- CAMERA FIT LOGIC ---
    const fov = camera.fov * (Math.PI / 180);
    let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
    cameraZ *= 1.4; // padding
    camera.position.set(0, 0, cameraZ);
    controls.target.set(0, 0, 0);
    controls.minDistance = cameraZ * 0.5;
    controls.maxDistance = cameraZ * 5;
    controls.update();

    overlay.style.opacity = '0';
    setTimeout(() => overlay.style.display = 'none', 400);

  }, (xhr) => {
    if (xhr.total > 0) {
      const p = Math.min((xhr.loaded / xhr.total) * 100, 100);
      bar.style.width = p + '%';
      status.innerText = `Loading... ${Math.round(p)}%`;
    }
  }, (err) => {
    console.error("Load error:", err);
    overlay.style.display = 'none';
    errorUI.style.display = "block";
    errorUI.innerText = "Failed to load model. Check file path.";
  });
}

select.addEventListener('change', (e) => {
  if (e.target.value) loadModel(e.target.value);
});

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
