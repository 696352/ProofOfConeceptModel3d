<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Portfolio Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #333; font-family: sans-serif; }
    
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 999;
      color: white; transition: opacity 0.5s;
    }

    .bar-container { width: 250px; height: 6px; background: #222; margin-top: 15px; border-radius: 10px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #00ffcc; transition: width 0.3s ease; }
    #status-text { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <div id="loading-overlay">
    <div id="status-text">Loading Assets... 0%</div>
    <div class="bar-container">
      <div id="progress-bar"></div>
    </div>
  </div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

// --- SCENE SETUP ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 25); 

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(10, 10, 10);
scene.add(sun);

// --- LOADING MANAGER ---
const bar = document.getElementById('progress-bar');
const status = document.getElementById('status-text');
const overlay = document.getElementById('loading-overlay');

const manager = new THREE.LoadingManager();

manager.onProgress = (url, loaded, total) => {
  // Cap the progress at 100%
  let percent = (loaded / total) * 100;
  percent = Math.min(percent, 100); 
  
  bar.style.width = percent + '%';
  status.innerHTML = `Loading Assets... ${Math.round(percent)}%`;
};

manager.onLoad = () => {
  overlay.style.opacity = '0';
  setTimeout(() => { overlay.style.display = 'none'; }, 600);
};

// --- LOADERS ---
const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");

const loader = new GLTFLoader(manager);
loader.setDRACOLoader(draco);

// --- MODELS ---
const modelPaths = [
  "Week15Done-v1.glb", 
  "Week9Done-v1.glb", 
  "Week3.glb"
];

const group = new THREE.Group();
scene.add(group);

modelPaths.forEach((path, index) => {
  loader.load(path, (gltf) => {
    const model = gltf.scene;

    // Center individual pivot
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);

    const wrapper = new THREE.Group();
    wrapper.add(model);
    
    // Space them out horizontally
    wrapper.position.x = (index - 1) * 15; 
    
    group.add(wrapper);
  }, undefined, (e) => console.error("Error loading:", path, e));
});

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
