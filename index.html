<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Portfolio Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; font-family: sans-serif; }
    #ui-container { position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; }
    select { padding: 12px 20px; border-radius: 50px; border: 1px solid #ccc; cursor: pointer; }
    #hint-overlay { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); color: white; padding: 8px 16px; border-radius: 20px; pointer-events: none; transition: opacity 0.5s; font-size: 13px; }
    #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999; color: white; }
    .bar-container { width: 200px; height: 4px; background: #333; margin-top: 10px; }
    #progress-bar { width: 0%; height: 100%; background: #00ffcc; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <div id="ui-container">
    <select id="model-select">
      <option value="" disabled selected>Select Week</option>
      <option value="Week15Done-v1.glb">Week 15</option>
      <option value="Week9-v1.glb">Week 9</option>
      <option value="Week3.glb">Week 3</option>
    </select>
    <button id="fs-btn" style="border-radius:50%; width:40px; height:40px; border:1px solid #ccc; cursor:pointer;">⛶</button>
  </div>

  <div id="hint-overlay">Drag to Rotate • Scroll to Zoom</div>
  <div id="loading-overlay">
    <div id="status-text">Loading...</div>
    <div class="bar-container"><div id="progress-bar"></div></div>
  </div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";

const select = document.getElementById('model-select');
const overlay = document.getElementById('loading-overlay');
const bar = document.getElementById('progress-bar');
const status = document.getElementById('status-text');
const hint = document.getElementById('hint-overlay');

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0xeeeeee);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 15);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.autoRotate = true;

const stopAuto = () => { controls.autoRotate = false; hint.style.opacity = '0'; };
renderer.domElement.addEventListener('mousedown', stopAuto);

scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(5, 10, 7);
scene.add(sun);

const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let currentModel = null;

function loadModel(filename) {
  if (currentModel) scene.remove(currentModel);
  overlay.style.display = 'flex';
  
  loader.load(filename, (gltf) => {
    currentModel = gltf.scene;
    const box = new THREE.Box3().setFromObject(currentModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    currentModel.position.sub(center);
    const scale = 7 / Math.max(size.x, size.y, size.z);
    currentModel.scale.set(scale, scale, scale);
    scene.add(currentModel);
    overlay.style.display = 'none';
    controls.autoRotate = true;
  }, (xhr) => {
    bar.style.width = (xhr.loaded / xhr.total * 100) + '%';
  });
}

select.addEventListener('change', (e) => loadModel(e.target.value));
document.getElementById('fs-btn').onclick = () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
};

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
