<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Portfolio Viewer</title>
  <style>
    :root {
      --primary-blue: #007bff;
      --hover-blue: #0056b3;
      --dark-navy: #001f3f;
      --sky-blue: #a1c4fd;
    }

    /* Stronger Dark Blue to Light Blue Gradient */
    body { 
      margin: 0; 
      overflow: hidden; 
      background: linear-gradient(180deg, var(--dark-navy) 0%, var(--sky-blue) 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }
    
    #ui-container { position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; align-items: center; }

    /* Blue Dropdown */
    select { 
      padding: 12px 25px; border-radius: 50px; 
      border: 2px solid var(--primary-blue); 
      background: white; color: var(--primary-blue);
      cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
      font-size: 16px; font-weight: 600; outline: none;
    }

    /* Toggle Switch for Grid */
    .toggle-container {
      display: flex;
      align-items: center;
      background: white;
      padding: 8px 15px;
      border-radius: 50px;
      border: 2px solid var(--primary-blue);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      color: var(--primary-blue);
      font-weight: 600;
      font-size: 14px;
      gap: 10px;
    }
    .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc; transition: .4s; border-radius: 20px;
    }
    .slider:before {
      position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
      background-color: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background-color: var(--primary-blue); }
    input:checked + .slider:before { transform: translateX(20px); }

    /* Reset Button */
    #reset-btn {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--primary-blue); color: white;
      padding: 12px 20px; border-radius: 50px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 100;
    }
    #reset-btn:hover { background: var(--hover-blue); }

    /* Loading Overlay */
    #loading-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0, 8, 20, 0.95); display: none; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 999; color: white; 
    }
    .bar-container { width: 200px; height: 6px; background: rgba(255,255,255,0.1); margin-top: 15px; border-radius: 10px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #00d4ff; }
  </style>
</head>
<body>

  <div id="ui-container">
    <select id="model-select">
      <option value="" disabled selected>Select Week</option>
      <option value="Week15Done-v1.glb">Week 15</option>
      <option value="Week9-v1.glb">Week 9</option>
      <option value="Week3.glb">Week 3</option>
    </select>

    <div class="toggle-container">
      Grid
      <label class="switch">
        <input type="checkbox" id="grid-toggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button id="reset-btn">Reset View (R)</button>

  <div id="loading-overlay">
    <div id="status-text">INITIALIZING...</div>
    <div class="bar-container"><div id="progress-bar"></div></div>
  </div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { DRACOLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/DRACOLoader.js";

const scene = new THREE.Scene();
scene.background = null; 

// Grid - Set to invisible by default
const grid = new THREE.GridHelper(100, 100, 0x007bff, 0xffffff);
grid.visible = false; 
scene.add(grid);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(50, 50, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

scene.add(new THREE.AmbientLight(0xffffff, 2));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(10, 50, 10);
scene.add(sun);

const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let currentModel = null;
let defaultCameraPos = new THREE.Vector3(50, 50, 50);
let defaultTarget = new THREE.Vector3(0, 0, 0);

function resetCamera() {
    // Stop all movement immediately
    controls.reset(); 
    camera.position.copy(defaultCameraPos);
    controls.target.copy(defaultTarget);
    
    // Explicitly update and render to prevent stutter
    controls.update();
    renderer.render(scene, camera); 
}

function loadModel(filename) {
    if (currentModel) scene.remove(currentModel);
    document.getElementById('loading-overlay').style.display = 'flex';

    loader.load(filename, (gltf) => {
        currentModel = gltf.scene;
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        currentModel.position.set(-center.x, -box.min.y, -center.z);
        scene.add(currentModel);

        const maxDim = Math.max(size.x, size.y, size.z);
        defaultCameraPos.set(maxDim * 1.5, maxDim * 0.8, maxDim * 1.5);
        defaultTarget.set(0, size.y / 4, 0);
        
        resetCamera();
        document.getElementById('loading-overlay').style.display = 'none';
    }, 
    (xhr) => {
        if (xhr.total > 0) document.getElementById('progress-bar').style.width = (xhr.loaded / xhr.total * 100) + '%';
    });
}

// UI LISTENERS
document.getElementById('grid-toggle').addEventListener('change', (e) => {
    grid.visible = e.target.checked;
});

window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'r') resetCamera();
});

document.getElementById('reset-btn').onclick = resetCamera;
document.getElementById('model-select').onchange = (e) => loadModel(e.target.value);

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
