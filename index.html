<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Portfolio Viewer</title>
  <style>
    :root {
      --primary-blue: #007bff;
      --hover-blue: #0056b3;
      --light-blue: #e7f1ff;
    }

    /* Gradient Background */
    body { 
      margin: 0; 
      overflow: hidden; 
      background: linear-gradient(180deg, #ffffff 0%, #d1e5ff 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }
    
    #ui-container { position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; gap: 10px; }

    /* Blue Dropdown */
    select { 
      padding: 12px 25px; border-radius: 50px; 
      border: 2px solid var(--primary-blue); 
      background: white; color: var(--primary-blue);
      cursor: pointer; box-shadow: 0 4px 15px rgba(0,123,255,0.2); 
      font-size: 16px; font-weight: 600; outline: none;
      transition: all 0.2s;
    }
    select:hover { background: var(--light-blue); }

    /* Reset Button */
    #reset-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--primary-blue);
      color: white;
      padding: 12px 20px;
      border-radius: 50px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,123,255,0.3);
      z-index: 100;
      transition: transform 0.1s, background 0.2s;
    }
    #reset-btn:hover { background: var(--hover-blue); transform: scale(1.05); }
    #reset-btn:active { transform: scale(0.95); }

    kbd {
      background: rgba(255,255,255,0.2);
      border: 1px solid white;
      border-radius: 3px;
      padding: 1px 4px;
      margin-left: 5px;
    }

    /* Loading Overlay */
    #loading-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0, 31, 63, 0.9); display: none; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 999; color: white; 
    }
    .bar-container { width: 200px; height: 6px; background: rgba(255,255,255,0.1); margin-top: 15px; border-radius: 10px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: #00d4ff; transition: width 0.2s; }
  </style>
</head>
<body>

  <div id="ui-container">
    <select id="model-select">
      <option value="" disabled selected>Select Week</option>
      <option value="Week15Done-v1.glb">Week 15</option>
      <option value="Week9-v1.glb">Week 9</option>
      <option value="Week3.glb">Week 3</option>
    </select>
  </div>

  <button id="reset-btn">Reset View <kbd>R</kbd></button>

  <div id="loading-overlay">
    <div id="status-text">PREPARING MODEL...</div>
    <div class="bar-container"><div id="progress-bar"></div></div>
  </div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { DRACOLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/DRACOLoader.js";

const scene = new THREE.Scene();
// Scene background is set to null so the CSS gradient shows through
scene.background = null; 

const grid = new THREE.GridHelper(100, 100, 0x007bff, 0xcccccc);
scene.add(grid);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(30, 30, 30);

const renderer = new THREE.WebGLRenderer({ 
    antialias: true, 
    alpha: true // Alpha true allows the CSS gradient to be visible
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

scene.add(new THREE.AmbientLight(0xffffff, 2));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(10, 50, 10);
scene.add(sun);

const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let currentModel = null;
let defaultCameraPos = new THREE.Vector3(30, 30, 30);
let defaultTarget = new THREE.Vector3(0, 0, 0);

function resetCamera() {
    // 1. Kill momentum/acceleration
    controls.enableDamping = false; 
    
    // 2. Set hard positions
    camera.position.copy(defaultCameraPos);
    controls.target.copy(defaultTarget);
    
    // 3. Force update then turn damping back on for future movements
    controls.update(); 
    controls.enableDamping = true; 
}

function loadModel(filename) {
    if (currentModel) scene.remove(currentModel);
    
    const overlay = document.getElementById('loading-overlay');
    const bar = document.getElementById('progress-bar');
    const status = document.getElementById('status-text');
    
    overlay.style.display = 'flex';
    status.innerText = "LOADING: " + filename.toUpperCase();

    loader.load(filename, (gltf) => {
        currentModel = gltf.scene;

        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        currentModel.position.x = -center.x;
        currentModel.position.y = -box.min.y; 
        currentModel.position.z = -center.z;

        scene.add(currentModel);

        const maxDim = Math.max(size.x, size.y, size.z);
        const dist = maxDim * 1.5;
        
        defaultCameraPos.set(dist, dist / 1.5, dist);
        defaultTarget.set(0, size.y / 4, 0);
        
        resetCamera();

        overlay.style.display = 'none';
    }, 
    (xhr) => {
        if (xhr.total > 0) bar.style.width = (xhr.loaded / xhr.total * 100) + '%';
    }, 
    (err) => {
        console.error(err);
        status.innerText = "FILE ERROR";
    });
}

window.addEventListener('keydown', (event) => {
    if (event.key.toLowerCase() === 'r') resetCamera();
});

document.getElementById('reset-btn').onclick = resetCamera;
document.getElementById('model-select').onchange = (e) => loadModel(e.target.value);

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
