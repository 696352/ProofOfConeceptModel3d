<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Portfolio Viewer</title>
  <style>
    :root {
      --primary-blue: #007bff;
      --dark-navy: #000c1d;
      --sky-blue: #7baef7;
      --north-red: #ff3b3b;
      --south-white: #ffffff;
    }

    body { 
      margin: 0; 
      overflow: hidden; 
      background: #000c1d; /* Solid dark fallback */
      font-family: 'Segoe UI', sans-serif; 
    }

    #welcome-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 12, 29, 0.9);
      backdrop-filter: blur(15px);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 200; transition: opacity 0.5s ease;
    }
    
    #welcome-prompt {
      color: white; font-size: 28px; font-weight: 800; margin-bottom: 20px;
      text-shadow: 0 0 20px var(--primary-blue);
    }

    #ui-container { position: fixed; top: 20px; left: 20px; z-index: 300; display: flex; gap: 10px; align-items: center; }

    select, .toggle-container { 
      padding: 12px 24px; border-radius: 50px; 
      border: 2px solid var(--primary-blue); 
      background: white; color: var(--primary-blue);
      box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
      font-size: 14px; font-weight: 700; outline: none; cursor: pointer;
    }

    #compass-hud {
      position: fixed; bottom: 40px; left: 40px;
      width: 80px; height: 80px; z-index: 100; cursor: pointer; border: none; background: none;
    }

    #compass-ring {
      width: 100%; height: 100%;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%; background: rgba(0, 0, 0, 0.5);
      position: relative; display: flex; justify-content: center; align-items: center;
    }
    
    #needle-wrapper {
      position: absolute; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .needle-diamond { width: 14px; height: 35px; clip-path: polygon(50% 0%, 100% 100%, 0% 100%); }
    .north-needle { background: var(--north-red); }
    .south-needle { background: var(--south-white); transform: rotate(180deg); }

    .dir { position: absolute; font-weight: 900; font-size: 14px; color: white; }
    .n { top: -25px; color: var(--north-red); }
    .s { bottom: -25px; }

    #reset-btn {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--primary-blue); color: white;
      padding: 12px 25px; border-radius: 50px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer; z-index: 100;
    }

    #loading-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: var(--dark-navy); display: none; flex-direction: column; 
      justify-content: center; align-items: center; z-index: 999; color: white; 
    }
    .bar-container { width: 200px; height: 10px; background: rgba(255,255,255,0.1); margin-top: 15px; border-radius: 10px; overflow: hidden; }
    #progress-bar { width: 0%; height: 100%; background: var(--primary-blue); transition: width 0.3s; }
  </style>
</head>
<body>

  <div id="welcome-screen">
    <div id="welcome-prompt">SELECT A WEEK TO START</div>
  </div>

  <div id="ui-container">
    <select id="model-select">
      <option value="" disabled selected>Select Week</option>
      <option value="Week15Done-v1.glb">Week 15</option>
      <option value="Week13-v1-v1.glb">Week 13</option>
      <option value="Week9-v1.glb">Week 9</option>
      <option value="Week7-v1-v1.glb">Week 7</option>
      <option value="Week3.glb">Week 3</option>
    </select>
    <div class="toggle-container">Grid <input type="checkbox" id="grid-toggle"></div>
  </div>

  <button id="compass-hud"><div id="compass-ring"><div id="needle-wrapper"><div class="dir n">N</div><div class="needle-diamond north-needle"></div><div class="needle-diamond south-needle"></div><div class="dir s">S</div></div></div></button>
  <button id="reset-btn">RESET VIEW (R)</button>

  <div id="loading-overlay">
    <div id="status-text">LOADING...</div>
    <div class="bar-container"><div id="progress-bar"></div></div>
  </div>

<script type="module">
import * as THREE from "https://esm.sh/three@0.160.0";
import { OrbitControls } from "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
import { DRACOLoader } from "https://esm.sh/three@0.160.0/examples/jsm/loaders/DRACOLoader.js";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 20000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 3));
const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(50, 200, 50);
scene.add(sun);

const grid = new THREE.GridHelper(200, 50, 0x007bff, 0x444444);
grid.visible = false;
scene.add(grid);

const draco = new DRACOLoader();
draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

let currentModel = null;
let defaultCameraPos = new THREE.Vector3(0, 50, 150); 
let defaultTarget = new THREE.Vector3(0, 0, 0);

// --- BACKGROUND LOADING ---
// We try LowBackground.glb since Background_2 seems to be empty
loader.load('LowBackground.glb', (gltf) => {
    const bg = gltf.scene;
    bg.traverse(n => { if(n.isMesh) { n.material.side = THREE.DoubleSide; n.material.transparent = true; } });
    
    // Center background
    const box = new THREE.Box3().setFromObject(bg);
    const center = box.getCenter(new THREE.Vector3());
    bg.position.set(-center.x, -center.y, -center.z);
    bg.scale.set(10, 10, 10); // Scale up if it's small
    scene.add(bg);
}, undefined, (e) => {
    console.log("Background file not found, using visual fallback.");
    // Visual Fallback: A giant star field sphere
    const geo = new THREE.SphereGeometry(5000, 32, 32);
    const mat = new THREE.MeshBasicMaterial({ color: 0x001533, side: THREE.BackSide });
    scene.add(new THREE.Mesh(geo, mat));
});

function resetCamera() {
    controls.reset(); 
    camera.position.copy(defaultCameraPos);
    controls.target.copy(defaultTarget);
    controls.update();
}

function loadModel(filename) {
    if (currentModel) scene.remove(currentModel);
    document.getElementById('welcome-screen').style.opacity = '0';
    setTimeout(() => document.getElementById('welcome-screen').style.display = 'none', 500);
    document.getElementById('loading-overlay').style.display = 'flex';

    loader.load(filename, (gltf) => {
        currentModel = gltf.scene;
        const box = new THREE.Box3().setFromObject(currentModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        currentModel.position.set(-center.x, -box.min.y, -center.z);
        scene.add(currentModel);

        const maxDim = Math.max(size.x, size.z);
        // Position camera on Z-axis (North Up)
        defaultCameraPos.set(0, size.y * 0.8, maxDim * 2); 
        defaultTarget.set(0, size.y / 2, 0);
        
        resetCamera();
        document.getElementById('loading-overlay').style.display = 'none';
    }, (xhr) => {
        const p = (xhr.loaded / (xhr.total || 10000000)) * 100;
        document.getElementById('progress-bar').style.width = p + '%';
    });
}

document.getElementById('grid-toggle').onchange = (e) => grid.visible = e.target.checked;
document.getElementById('reset-btn').onclick = resetCamera;
document.getElementById('compass-hud').onclick = resetCamera; 
document.getElementById('model-select').onchange = (e) => loadModel(e.target.value);

window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
};

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    const angle = Math.atan2(camera.position.x - controls.target.x, camera.position.z - controls.target.z);
    document.getElementById('needle-wrapper').style.transform = `rotate(${angle}rad)`;
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
