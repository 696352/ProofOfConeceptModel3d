<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Portfolio Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* UI Container - Oval Dropdown and Fullscreen */
    #ui-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    select {
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 50px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      outline: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 15px;
      padding-right: 45px;
      transition: all 0.3s ease;
    }

    #fs-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: transform 0.2s;
    }
    #fs-btn:hover { transform: scale(1.1); }

    /* Interaction Hint */
    #hint-overlay {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
